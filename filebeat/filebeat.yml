filebeat.modules:
  - module: zeek
    connection:
      enabled: true
      var.paths: ["/zeek/current/conn.log"]
    dns:
      enabled: true
      var.paths: ["/zeek/current/dns.log"]
    http:
      enabled: true
      var.paths: ["/zeek/current/http.log"]
    files:
      enabled: true
      var.paths: ["/zeek/current/files.log"]
    ssl:
      enabled: true
      var.paths: ["/zeek/current/ssl.log"]
    notice:
      enabled: true
      var.paths: ["/zeek/current/notice.log"]
  - module: suricata
    eve:
      enabled: true
      var.paths: ["/suricata/eve.json"]

output.elasticsearch:
  hosts: ["elasticsearch:9200"]

setup.dashboards.enabled: true
setup.kibana:
  host: "kibana:5601"
setup.template.enabled: true